<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Misión Pandora: Mi Cumpleaños!</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pandora-blue: #00d4ff;
            --deep-ocean: #0a192f;
            --forest-green: #1a472a;
            --glow: 0 0 15px var(--pandora-blue);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-ocean);
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Estrellas de fondo simulando partículas */
        .stars {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 10vw 20vh 2px white, 50vw 40vh 2px white, 80vw 10vh 2px white;
            animation: blink 3s infinite;
        }

        .container {
            max-width: 500px;
            width: 90%;
            background: rgba(10, 25, 47, 0.8);
            border: 2px solid var(--pandora-blue);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: var(--glow);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--pandora-blue);
            text-shadow: var(--glow);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .info-section {
            margin: 20px 0;
            padding: 15px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }

        .info-section:last-child {
            border-bottom: none;
        }

        .date {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .btn-confirm {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: transparent;
            color: var(--pandora-blue);
            border: 2px solid var(--pandora-blue);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: var(--glow);
        }

        .btn-confirm:hover {
            background: var(--pandora-blue);
            color: var(--deep-ocean);
            box-shadow: 0 0 30px var(--pandora-blue);
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        /* Adorno de hojas espirituales */
        .decoration {
            font-size: 2rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <div class="decoration">🪷</div>
        <h1>Irayo</h1>
        <p class="subtitle">¡Estás invitado a Pandora!</p>
        
        <div class="info-section">
            <p>Acompáñame a celebrar mi cumpleaños número</p>
            <div class="date" style="font-size: 3rem;">8</div>
        </div>

        <div class="info-section">
            <p><strong>¿CUÁNDO?</strong></p>
            <p class="date">Sábado, 25 de Abril</p>
            <p>A las 16:00 Horas</p>
        </div>

        <div class="info-section">
            <p><strong>¿DÓNDE?</strong></p>
            <p>Bosque de los Espíritus (Tu Dirección Aquí)</p>
            <p><em>Montero, Santa Cruz</em></p>
        </div>

        <a href="https://wa.me/591XXXXXXXX?text=¡Oel%20ngati%20kameie!%20Confirmo%20mi%20asistencia" class="btn-confirm">
            CONFIRMAR ASISTENCIA (WhatsApp)
        </a>

        <p style="margin-top: 40px; font-size: 0.8rem; opacity: 0.6;">
            "Oel ngati kameie" - Te veo
        </p>
    </div>

</body>
</html>
